<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripWay | Contatos</title>
</head>

<body>
    <nav>
        <a href="../index.html">TripWay</a>
        <ul>
            <li><a href="destinos.html">Destinos</a></li>
            <li><a href="servicos.html">Serviços</a></li>
            <li><a href="contatos.html">Contato</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h1>Formulário de Contato:</h1>

            <img src="../images/contato.avif" alt="Imagem de viagem" width="400">

            <form>

                <label for="destino">Destino de Interesse:</label>
                <select id="destino">
                    <option value="eua">Estados Unidos</option>
                    <option value="ibiza">Ibiza</option>
                    <option value="rj">Rio de Janeiro</option>
                </select>

                <label for="name">Nome:</label>
                <input type="text" id="name" placeholder="Ex: João Vitor" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="Ex: joao.vitor@example.com" required>

                <label for="date">Data:</label>
                <input type="date" id="date" placeholder="Ex: 07/04/2026" required>

                <label for="numberPeople">Quantidade de Pessoas:</label>
                <input type="number" id="numberPeople" placeholder="Ex: 5" required>

                <label for="message">Mensagem:</label>
                <input type="text" id="message" placeholder="Digite sua mensagem ou dúvida" required>

                <button type="submit">Enviar</button>
            </form>

        </section>
    </main>
</body>

</html>
